name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr_agent:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PR-Agent
        run: pip install pr-agent

      - name: Create config file
        run: |
          mkdir -p .pr_agent
          echo "[github]" > .pr_agent/config.toml
          echo "user_token = \"${{ secrets.GITHUB_TOKEN }}\"" >> .pr_agent/config.toml

      - name: Run PR-Agent
        env:
          OPENAI_API_TYPE: openai
          OPENAI_API_BASE: https://api.groq.com/openai/v1
          OPENAI_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_MODEL: groq/llama3-70b-8192
        run: |
          export PR_AGENT_CONFIG_PATH=.pr_agent/config.toml
          pr-agent --pr_url "${{ github.event.pull_request.html_url }}" review