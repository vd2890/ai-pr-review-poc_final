name: Check PR Size

on:
  pull_request:

jobs:
  check-pr-size:
    runs-on: ubuntu-latest

    steps:
      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const total = pr.additions + pr.deletions;

            if (total > 500) {
              core.setFailed(`PR too large: ${total} lines`);
            }